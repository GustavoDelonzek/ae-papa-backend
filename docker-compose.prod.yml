version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: ./docker/app/Dockerfile.prod
    image: aepapa-backend-prod:latest
    container_name: aepapa_app
    restart: unless-stopped
    working_dir: /var/www/
    env_file: 
      - ./src/.env 
    volumes:
      - shared_code:/var/www
      - ./src/.env:/var/www/.env
    networks:
      - app-network

  worker:
    image: aepapa-backend-prod:latest
    container_name: aepapa_worker
    restart: unless-stopped
    command: >
      sh -c "php artisan config:cache && 
             php artisan route:cache && 
             php artisan view:cache && 
             echo 'Caches gerados, iniciando worker...' && 
             php artisan queue:work --verbose --sleep=3 --tries=3 --timeout=120"
    environment:
      - LOG_CHANNEL=stderr
    env_file:
      - ./src/.env
    volumes:
      - shared_code:/var/www
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: aepapa_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - shared_code:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: aepapa_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-aepapa}
      POSTGRES_USER: ${DB_USERNAME:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-user} -d ${DB_DATABASE:-aepapa}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: aepapa_rabbitmq
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  redis:
    image: redis:6-alpine
    container_name: aepapa_redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
    driver: local
  redis-data:
    driver: local
  shared_code:
    driver: local
