services:
  app:
    build:
      context: .
      dockerfile: ./docker/app/Dockerfile.prod
    image: aepapa-backend-prod:latest
    container_name: aepapa_app
    restart: unless-stopped
    env_file: 
      - ./src/.env 
    volumes:
      - shared_code:/var/www
      - ./src/.env:/var/www/.env
    networks:
      - aepapa-network

  worker:
    image: aepapa-backend-prod:latest
    container_name: aepapa_worker
    restart: unless-stopped
    command: >
      sh -c "php artisan config:cache && 
             php artisan route:cache && 
             php artisan view:cache && 
             php artisan queue:work --verbose --sleep=3 --tries=3 --timeout=120"
    env_file:
      - ./src/.env
    volumes:
      - shared_code:/var/www
    networks:
      - aepapa-network

  nginx:
    image: nginx:alpine
    container_name: aepapa_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - shared_code:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - aepapa-network
    depends_on:
      - app

networks:
  aepapa-network:
    external: true

volumes:
  shared_code:
